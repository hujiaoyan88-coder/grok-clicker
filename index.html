<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Grok Clicker 🌌</title>
<style>
  body { 
    margin:0; padding:0; 
    background: radial-gradient(circle at center, #0f1a3d 0%, #000011 100%); 
    color:#cceeff; font-family:system-ui,sans-serif; 
    min-height:100vh; overflow-x:hidden; 
  }
  .container { max-width:620px; margin:0 auto; padding:15px; position:relative; z-index:10; }

  h1 { text-align:center; font-size:2.3rem; margin:10px 0; text-shadow:0 0 20px #66aaff; }
  .subtitle { text-align:center; color:#88bbff; margin-bottom:15px; }

  #click-area {
    width:100%; max-width:380px; height:260px; margin:0 auto 25px;
    background:radial-gradient(circle at 50% 35%, #445577, #112244, #000011);
    border:6px solid #66aaff; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:4.8rem; box-shadow:0 0 60px #4488ff, inset 0 0 80px rgba(255,255,255,0.15);
    cursor:pointer; user-select:none; position:relative;
  }
  #click-area:active { transform:scale(0.92); }

  .stats { background:rgba(20,40,80,0.7); border:2px solid #4488ff; border-radius:16px; padding:20px; text-align:center; margin-bottom:20px; }
  .stars { font-size:3.2rem; font-weight:bold; color:#aaddff; }
  .per-sec { font-size:1.4rem; color:#88ccff; }

  .buy-multi { display:flex; justify-content:center; gap:8px; margin:15px 0; }
  .multi-btn { background:#113366; color:#aaddff; border:2px solid #4488ff; padding:8px 16px; border-radius:9999px; font-weight:bold; cursor:pointer; }
  .multi-btn.active { background:#2266cc; border-color:#66aaff; color:white; }

  .shop h2 { text-align:center; margin:20px 0 12px; }
  .building {
    background:rgba(15,30,70,0.85); border:2px solid #4488ff; border-radius:14px;
    padding:16px; margin-bottom:14px; display:flex; align-items:center; gap:15px;
  }
  .building-info { flex:1; }
  .building-name { font-size:1.3rem; font-weight:bold; }
  .building-stats { font-size:0.95rem; color:#99bbdd; margin-top:4px; }
  .buy-btn {
    background:#2266cc; color:white; border:none; padding:14px 28px;
    border-radius:9999px; font-size:1.1rem; font-weight:bold; cursor:pointer;
  }
  .buy-btn:hover:not(:disabled) { background:#3388ee; }

  .floating-text { 
    position:absolute; color:#aaffff; font-weight:bold; pointer-events:none; 
    text-shadow:0 0 10px #66aaff; animation:floatUp 0.9s ease-out forwards; 
  }
  @keyframes floatUp { to { transform:translateY(-90px); opacity:0; } }

  .star-particle {
    position: fixed; font-size: 1.4rem; pointer-events: none; z-index: 5;
    animation: fall linear forwards; text-shadow: 0 0 8px #88eeff;
    opacity: 0.6;
  }
  @keyframes fall {
    to { transform: translateY(120vh) rotate(720deg); opacity: 0; }
  }

  .ufo {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 0 20px #aaffff, 0 0 40px #66ccff;
    filter: drop-shadow(0 0 12px #88ffff);
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌌 Grok Clicker</h1>
  <p class="subtitle">宇宙をクリックして支配せよ</p>

  <div id="click-area" onclick="clickCosmos(event)">✨</div>

  <div class="stats">
    <div>所持星</div>
    <div id="star-count" class="stars">0</div>
    <div id="star-per-sec" class="per-sec">0 /秒</div>
  </div>

  <div class="buy-multi">
    <div class="multi-btn active" data-multi="1" onclick="setMultiplier(1)">1</div>
    <div class="multi-btn" data-multi="10" onclick="setMultiplier(10)">10</div>
    <div class="multi-btn" data-multi="100" onclick="setMultiplier(100)">100</div>
    <div class="multi-btn" data-multi="max" onclick="setMultiplier('max')">MAX</div>
  </div>

  <div class="shop">
    <h2>🛒 宇宙建造物</h2>

    <div class="building" data-id="planet">
      <div class="building-info">
        <div class="building-name">🪐 惑星</div>
        <div class="building-stats">所持: <span class="owned">0</span><br>コスト: <span class="cost">15</span> 星<br>生産: <span class="prod">0.2</span> /秒</div>
      </div>
      <button class="buy-btn" onclick="buyBuilding('planet')">購入</button>
    </div>

    <div class="building" data-id="star">
      <div class="building-info">
        <div class="building-name">⭐ 恒星</div>
        <div class="building-stats">所持: <span class="owned">0</span><br>コスト: <span class="cost">120</span> 星<br>生産: <span class="prod">1.5</span> /秒</div>
      </div>
      <button class="buy-btn" onclick="buyBuilding('star')">購入</button>
    </div>

    <div class="building" data-id="galaxy">
      <div class="building-info">
        <div class="building-name">🌌 銀河</div>
        <div class="building-stats">所持: <span class="owned">0</span><br>コスト: <span class="cost">1,200</span> 星<br>生産: <span class="prod">12</span> /秒</div>
      </div>
      <button class="buy-btn" onclick="buyBuilding('galaxy')">購入</button>
    </div>

    <div class="building" data-id="blackhole">
      <div class="building-info">
        <div class="building-name">🕳️ ブラックホール</div>
        <div class="building-stats">所持: <span class="owned">0</span><br>コスト: <span class="cost">10,000</span> 星<br>生産: <span class="prod">80</span> /秒</div>
      </div>
      <button class="buy-btn" onclick="buyBuilding('blackhole')">購入</button>
    </div>
  </div>

  <div style="text-align:center; margin:25px 0; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
    <button onclick="resetGame()" style="background:#cc3344; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">
      🔄 完全リセット
    </button>
    <button id="retry-btn" onclick="spawnUFO()" style="display:none; background:#226644; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; box-shadow:0 0 15px #44aa88;">
      🛸 やり直し（プレステージ）
    </button>
  </div>
</div>

<script>
// ==================== データ ====================
let game = { 
  stars: 0, 
  lastSaved: Date.now(), 
  buildings: {
    planet:    { owned: 0, baseCost: 15,   costMult: 1.15, baseProd: 0.2 },
    star:      { owned: 0, baseCost: 120,  costMult: 1.15, baseProd: 1.5 },
    galaxy:    { owned: 0, baseCost: 1200, costMult: 1.15, baseProd: 12 },
    blackhole: { owned: 0, baseCost: 10000,costMult: 1.15, baseProd: 80 }
  }, 
  clickPower: 1,
  starRainLevel: 1,
  prestigeCount: 0   // やり直し回数（将来用）
};

let lastUpdate = Date.now();
let currentMultiplier = 1;
let rainInterval = null;

// ==================== ヘルパー ====================
function formatNumber(num) {
  if (!isFinite(num) || num <= 0) return '0';
  num = Math.floor(num);
  if (num < 10000) return num.toLocaleString('ja-JP');
  if (num < 1000000) return (num / 1000).toFixed(1) + 'K';
  if (num < 1000000000) return (num / 1000000).toFixed(2) + 'M';
  const suffixes = ['B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  let tier = 2;
  let n = num / 1000000000;
  while (n >= 1000 && tier < suffixes.length + 1) {
    n /= 1000;
    tier++;
  }
  return n.toFixed(2) + suffixes[tier - 2];
}

function getTotalProduction() {
  let total = 0;
  for (let key in game.buildings) total += game.buildings[key].owned * game.buildings[key].baseProd;
  return total;
}

function getCost(id, count = 1) {
  const b = game.buildings[id];
  let total = 0;
  let cur = b.baseCost * Math.pow(b.costMult, b.owned);
  for (let i = 0; i < count; i++) {
    total += Math.floor(cur);
    cur *= b.costMult;
  }
  return Math.floor(total);
}

function updateDisplay() {
  document.getElementById('star-count').textContent = formatNumber(game.stars);
  document.getElementById('star-per-sec').textContent = formatNumber(getTotalProduction()) + ' /秒';

  document.querySelectorAll('.building').forEach(el => {
    const id = el.dataset.id;
    const b = game.buildings[id];
    if (!b) return;
    const count = (currentMultiplier === 'max') ? 1 : currentMultiplier;
    el.querySelector('.cost').textContent = formatNumber(getCost(id, count));
    el.querySelector('.owned').textContent = b.owned;
  });

  const retryBtn = document.getElementById('retry-btn');
  if (retryBtn) retryBtn.style.display = (game.buildings.blackhole.owned > 20) ? 'inline-block' : 'none';
}

// ==================== クリック ====================
function clickCosmos(e) {
  game.stars += game.clickPower;
  updateDisplay();
  saveGame();
  createFloating(e, '+' + game.clickPower);
}

function createFloating(e, text) {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const div = document.createElement('div');
  div.className = 'floating-text';
  div.textContent = text;
  div.style.left = x + 'px'; div.style.top = y + 'px';
  e.currentTarget.appendChild(div);
  setTimeout(() => div.remove(), 900);
}

// ==================== 星の雨 ====================
function createFallingStar() {
  const star = document.createElement('div');
  star.className = 'star-particle';
  star.textContent = '☆';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = '-30px';
  star.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
  star.style.opacity = 0.5 + Math.random() * 0.5;
  star.style.fontSize = (1.2 + Math.random() * 0.6) + 'rem';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 8000);
}

function startStarRain() {
  if (rainInterval) clearInterval(rainInterval);
  const intervalTime = Math.max(300, 1200 - game.starRainLevel * 150);
  rainInterval = setInterval(() => {
    const num = 1 + Math.floor(game.starRainLevel / 2);
    for (let i = 0; i < num; i++) createFallingStar();
  }, intervalTime);
}

// 初回購入エフェクト（省略）
function triggerFirstPurchaseEffect(id) {
  game.starRainLevel = Math.min(8, game.starRainLevel + 1);
  startStarRain();
}

// ==================== 購入 ====================
function buyBuilding(id) {
  const wasOwned = game.buildings[id].owned;
  let count = currentMultiplier === 'max' ? 999999 : currentMultiplier;
  if (currentMultiplier === 'max') {
    let maxBuy = 0; let temp = game.stars;
    let curCost = game.buildings[id].baseCost * Math.pow(game.buildings[id].costMult, wasOwned);
    while (temp >= Math.floor(curCost) && maxBuy < 10000) {
      temp -= Math.floor(curCost);
      curCost *= game.buildings[id].costMult;
      maxBuy++;
    }
    count = maxBuy || 1;
  }
  const totalCost = getCost(id, count);
  if (game.stars >= totalCost && count > 0) {
    game.stars -= totalCost;
    game.buildings[id].owned += count;
    if (wasOwned === 0 && game.buildings[id].owned > 0) triggerFirstPurchaseEffect(id);
    updateDisplay();
    saveGame();
  }
}

function setMultiplier(multi) {
  currentMultiplier = multi;
  document.querySelectorAll('.multi-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.multi == multi));
  updateDisplay();
}

// ==================== 🛸 やり直し（プレステージ） ====================
function spawnUFO() {
  const bh = game.buildings.blackhole.owned;
  if (bh <= 20) return;

  // === リセット処理（星と建物所持数を0に） ===
  game.stars = 0;
  Object.keys(game.buildings).forEach(key => {
    game.buildings[key].owned = 0;
  });
  // blackholeはやり直し時に0に戻す（UFOは残る）
  
  game.prestigeCount = (game.prestigeCount || 0) + 1;

  updateDisplay();
  saveGame();

  // === 新しいUFO出現（速度を遅く） ===
  let sizeRem = 2.8;
  if (bh >= 100) sizeRem = 9.0;
  else if (bh >= 90) sizeRem = 8.0;
  else if (bh >= 80) sizeRem = 7.0;
  else if (bh >= 70) sizeRem = 6.2;
  else if (bh >= 60) sizeRem = 5.5;
  else if (bh >= 50) sizeRem = 4.8;
  else if (bh >= 40) sizeRem = 4.2;
  else if (bh >= 30) sizeRem = 3.5;

  const ufo = document.createElement('div');
  ufo.className = 'ufo';
  ufo.textContent = '🛸';
  ufo.style.fontSize = sizeRem + 'rem';
  ufo.style.left = (5 + Math.random() * 80) + 'vw';
  ufo.style.top  = (5 + Math.random() * 80) + 'vh';
  document.body.appendChild(ufo);

  // 速度を大幅に遅く（前の3.8 → 1.6程度）
  let vx = (Math.random() - 0.5) * 1.6;
  let vy = (Math.random() - 0.5) * 1.6;

  function move() {
    if (!ufo.isConnected) return;
    let x = parseFloat(ufo.style.left);
    let y = parseFloat(ufo.style.top);

    x += vx; y += vy;

    if (x < 0) { x = 0; vx = Math.abs(vx) * 0.92; }
    if (x > 88) { x = 88; vx = -Math.abs(vx) * 0.92; }
    if (y < 0) { y = 0; vy = Math.abs(vy) * 0.92; }
    if (y > 88) { y = 88; vy = -Math.abs(vy) * 0.92; }

    if (Math.random() < 0.018) {
      vx += (Math.random() - 0.5) * 1.2;
      vy += (Math.random() - 0.5) * 1.2;
    }

    ufo.style.left = x + 'vw';
    ufo.style.top  = y + 'vh';
    requestAnimationFrame(move);
  }
  move();
}

// ==================== ループ・保存 ====================
function gameLoop() {
  const now = Date.now();
  game.stars += getTotalProduction() * (now - lastUpdate) / 1000;
  lastUpdate = now;
  updateDisplay();
  if (Math.floor(now / 5000) !== Math.floor(game.lastSaved / 5000)) saveGame();
  requestAnimationFrame(gameLoop);
}

function saveGame() {
  game.lastSaved = Date.now();
  localStorage.setItem('grokClicker_v5', JSON.stringify(game));  // v5に変更
}

function loadGame() {
  const saved = localStorage.getItem('grokClicker_v5');
  if (saved) {
    const data = JSON.parse(saved);
    Object.assign(game, data);
    const offline = (Date.now() - (data.lastSaved || Date.now())) / 1000;
    if (offline > 5) game.stars += getTotalProduction() * offline;
  }
  lastUpdate = Date.now();
  startStarRain();
}

function resetGame() {
  if (confirm('完全にリセットしますか？（UFOも星も建物も全部消えます）')) {
    localStorage.removeItem('grokClicker_v5');
    document.querySelectorAll('.ufo').forEach(u => u.remove());
    location.reload();
  }
}

function init() {
  loadGame();
  updateDisplay();
  gameLoop();
  window.game = game;
}

init();
</script>
</body>
</html>
